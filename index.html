<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- main css -->
    <link rel="stylesheet" href="./css/main.css" />

    <!-- remix icon cdn -->
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />

    <!-- box icon cdn -->
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />

    <!-- google font: Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <title>Responsive Practice Website - Hwang Tran | ホアン・チャン</title>
  </head>
  <body>
    <!-- header section start -->
    <header class="header">
      <!-- logo -->
      <a href="#!" class="logo">
        <img src="./images/Logo.png" alt="Ciseco – WooCommerce" />
      </a>

      <!-- naviagtion -->
      <ul class="header__navbar">
        <li class="header__navbarList">
          <a href="#home" class="header__navbarLink active">Home</a>
        </li>

        <li class="header__navbarList">
          <a href="#about" class="header__navbarLink">About</a>
        </li>

        <li class="header__navbarList">
          <a href="#shop" class="header__navbarLink">Shop</a>
        </li>

        <li class="header__navbarList">
          <a href="#pages" class="header__navbarLink">Pages</a>
        </li>

        <li class="header__navbarList">
          <a href="#blog" class="header__navbarLink">Blog</a>
        </li>

        <li class="header__navbarList">
          <a href="#contact" class="header__navbarLink">Contact</a>
        </li>
      </ul>

      <!-- call to action -->
      <div class="header__icons">
        <a href="#!" class="header__iconsLink">
          <i class="ri-search-line"></i>
        </a>
        <a href="#!" class="header__iconsLink">
          <i class="ri-user-line"></i>
        </a>
        <a href="#!" class="header__iconsLink">
          <i class="ri-shopping-cart-line"></i>
        </a>

        <div id="menu-icon" class="bx bx-menu"></div>
      </div>
    </header>
    <!-- header section end -->
    <!-- main js -->
    <script src="./js/main.js"></script>
  </body>
</html>
